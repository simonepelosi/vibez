<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vibez — Connect Apple Music</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #282c34;
      border: 1px solid #313244;
      border-radius: 16px;
      padding: 48px 56px;
      max-width: 460px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      color: #c678dd;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }
    .subtitle {
      color: #5c6370;
      font-size: 0.9rem;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #c678dd;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      width: 100%;
      justify-content: center;
    }
    .btn:hover { background: #b56fcc; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { background: #313244; color: #5c6370; cursor: not-allowed; }
    .status {
      margin-top: 24px;
      font-size: 0.9rem;
      min-height: 24px;
      color: #98c379;
    }
    .status.error { color: #e06c75; }
    .success-box {
      display: none;
      margin-top: 24px;
      background: #1e2a1e;
      border: 1px solid #98c379;
      border-radius: 10px;
      padding: 20px;
      text-align: left;
    }
    .success-box h3 { color: #98c379; margin-bottom: 8px; }
    .success-box p { color: #abb2bf; font-size: 0.9rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">♪ vibez</div>
    <div class="subtitle">vibe-driven music player for your terminal</div>

    <button class="btn" id="connectBtn" onclick="connectAppleMusic()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      Connect Apple Music
    </button>

    <div class="status" id="status"></div>

    <div class="success-box" id="successBox">
      <h3>✓ Connected!</h3>
      <p>vibez is now linked to your Apple Music account.<br/>
         Return to your terminal — the app will continue automatically.</p>
    </div>
  </div>

  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"
          data-web-components crossorigin></script>
  <script>
    const developerToken = "{{.DeveloperToken}}";

    async function connectAppleMusic() {
      const btn = document.getElementById("connectBtn");
      const status = document.getElementById("status");

      btn.disabled = true;
      btn.textContent = "Connecting…";
      status.className = "status";
      status.textContent = "Initializing MusicKit…";

      try {
        await MusicKit.configure({
          developerToken,
          app: { name: "vibez", build: "0.1.0" },
        });

        status.textContent = "Waiting for authorization…";
        const music = MusicKit.getInstance();
        const userToken = await music.authorize();

        status.textContent = "Sending token to vibez…";
        const resp = await fetch("/callback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user_token: userToken }),
        });

        if (!resp.ok) {
          throw new Error("Server returned " + resp.status);
        }

        status.textContent = "";
        document.getElementById("successBox").style.display = "block";
        btn.textContent = "Connected ✓";
      } catch (err) {
        status.className = "status error";
        status.textContent = "Error: " + err.message;
        btn.disabled = false;
        btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg> Try Again`;
      }
    }
  </script>
</body>
</html>
