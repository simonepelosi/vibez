name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install garble
        run: go install mvdan.cc/garble@latest

      - name: Generate Apple Developer Token
        id: devtoken
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          TOKEN=$(go run ./scripts/gen-devtoken)
          # Mask the token so it never appears in logs
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_DEV_TOKEN: ${{ steps.devtoken.outputs.token }}
          PROJECT_DIR: ${{ github.workspace }}
          # Prevent Go from downloading a different toolchain into GOMODCACHE,
          # which garble cannot patch (overlay restrictions on GOMODCACHE).
          GOTOOLCHAIN: local

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload binary artifact for Flatpak job
        uses: actions/upload-artifact@v4
        with:
          name: vibez-binary
          path: dist/vibez_linux_amd64.tar.gz

  flatpak-prep:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: vibez-binary
          path: .

      - name: Patch Flatpak manifest
        env:
          TAG: ${{ needs.release.outputs.tag }}
        run: |
          # Extract just the vibez binary (explicit path, no wildcards).
          tar -xzf vibez_linux_amd64.tar.gz --strip-components=1 vibez_linux_amd64/vibez
          chmod +x vibez
          sha=$(sha256sum vibez | awk '{print $1}')
          # Patch the manifest to reference the extracted binary directly.
          sed -i "s|sha256: 0000.*|sha256: ${sha}|" flatpak/io.github.simonepelosi.vibez.yml
          cp vibez flatpak/

      - name: Upload patched manifest and tarball
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-sources
          path: |
            flatpak/io.github.simonepelosi.vibez.yml
            flatpak/vibez

  flatpak:
    needs: [release, flatpak-prep]
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-46
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download sources
        uses: actions/download-artifact@v4
        with:
          name: flatpak-sources
          path: flatpak/

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: vibez.flatpak
          manifest-path: flatpak/io.github.simonepelosi.vibez.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: vibez.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
