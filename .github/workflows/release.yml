name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install garble
        run: go install mvdan.cc/garble@latest

      - name: Generate Apple Developer Token
        id: devtoken
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          TOKEN=$(go run ./scripts/gen-devtoken)
          # Mask the token so it never appears in logs
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_DEV_TOKEN: ${{ steps.devtoken.outputs.token }}
          PROJECT_DIR: ${{ github.workspace }}
          # Prevent Go from downloading a different toolchain into GOMODCACHE,
          # which garble cannot patch (overlay restrictions on GOMODCACHE).
          GOTOOLCHAIN: local

      - name: Extract tag name
        id: tag
        run: echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  flatpak:
    needs: release
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release asset and patch manifest
        env:
          TAG: ${{ needs.release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" \
            "https://api.github.com/repos/simonepelosi/vibez/releases/tags/${TAG}")
          ASSET_URL=$(echo "$RELEASE" | python3 -c \
            "import sys,json; a=[x for x in json.load(sys.stdin).get('assets',[]) if 'linux_amd64' in x['name'] and x['name'].endswith('.tar.gz')]; print(a[0]['browser_download_url'] if a else '')")
          if [ -z "$ASSET_URL" ]; then echo "Asset not found in release"; exit 1; fi
          curl -fsSL -L -H "Authorization: Bearer ${GH_TOKEN}" "$ASSET_URL" -o vibez_amd64.tar.gz

          sha=$(sha256sum vibez_amd64.tar.gz | awk '{print $1}')
          sed -i "/x86_64/{n; s|url:.*|url: ${ASSET_URL}|; n; s|sha256:.*|sha256: ${sha}|}" \
            flatpak/io.github.simonepelosi.vibez.yml
          sed -i "s|/v0\.0\.0/|/${TAG}/|g" flatpak/io.github.simonepelosi.vibez.yml

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: vibez.flatpak
          manifest-path: flatpak/io.github.simonepelosi.vibez.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release.outputs.tag }}
          files: vibez.flatpak
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
