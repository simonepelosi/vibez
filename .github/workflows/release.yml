name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --fix-missing libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install garble
        run: go install mvdan.cc/garble@latest

      - name: Generate Apple Developer Token
        id: devtoken
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PRIVATE_KEY: ${{ secrets.APPLE_PRIVATE_KEY }}
        run: |
          TOKEN=$(go run ./scripts/gen-devtoken)
          # Mask the token so it never appears in logs
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG entry
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extracts the section for VERSION from CHANGELOG.md.
          # Expected format: "## [X.Y.Z] — YYYY-MM-DD" headers.
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG entry found for version ${VERSION}" > release_notes.md
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --release-notes=release_notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_DEV_TOKEN: ${{ steps.devtoken.outputs.token }}
          PROJECT_DIR: ${{ github.workspace }}
          # Prevent Go from downloading a different toolchain into GOMODCACHE,
          # which garble cannot patch (overlay restrictions on GOMODCACHE).
          GOTOOLCHAIN: local
