name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit
        run: PKG_CONFIG_PATH=${{ github.workspace }}/pkg-config pre-commit run --all-files

  test:
    name: build-vet-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev

      - name: Build
        run: PKG_CONFIG_PATH=${{ github.workspace }}/pkg-config go build ./...

      - name: Vet
        run: PKG_CONFIG_PATH=${{ github.workspace }}/pkg-config go vet ./...

      - name: Test
        run: PKG_CONFIG_PATH=${{ github.workspace }}/pkg-config go test -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage summary
        run: |
          go tool cover -func=coverage.out | tail -1 | awk '{print "Total coverage: " $3}' >> $GITHUB_STEP_SUMMARY
