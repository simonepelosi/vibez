version: 2

before:
  hooks:
    - go mod tidy
    - go install mvdan.cc/garble@latest

builds:
  - id: vibez
    binary: vibez
    gobinary: ./scripts/garble-go
    ldflags:
      - -s -w
      - -X 'github.com/simone-vibes/vibez/internal/auth.devToken={{ .Env.APPLE_DEV_TOKEN }}'
    env:
      - CGO_ENABLED=1
      - PKG_CONFIG_PATH={{ .Env.PROJECT_DIR }}/pkg-config
      - GOTOOLCHAIN=local
    goos:
      - linux
    goarch:
      - amd64

archives:
  - id: vibez
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: simonepelosi
    name: vibez
  draft: false
  prerelease: auto

brews:
  - name: vibez
    repository:
      owner: simonepelosi
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/simonepelosi/vibez"
    description: "Apple Music TUI for Linux — vibe-driven music discovery"
    license: "MIT"
    install: |
      bin.install "vibez"
    test: |
      system "#{bin}/vibez version"
