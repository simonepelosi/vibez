<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <!--
    This page runs inside a hidden WebKit2GTK window.
    MusicKit JS handles FairPlay DRM and Apple Music streaming.
    Go communicates bidirectionally:
      Go → JS: w.Eval("window.vibez*(...)") for playback commands
      JS → Go: bound functions (goNeedsAuth, goAuthComplete, goPlayerStateChange, goUserTokenChanged, goError)
  -->
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"></script>
</head>
<body>
<script>
  document.addEventListener('musickitloaded', async function() {
    try {
      const music = await MusicKit.configure({
        developerToken: '{{.DeveloperToken}}',
        app: { name: 'vibez', build: '{{.Version}}' }
      });

      // Inject an existing user token if the Go side already has one.
      // MusicKit v3 exposes a setter for musicUserToken on the instance.
      const savedToken = '{{.UserToken}}';
      if (savedToken !== '') {
        music.musicUserToken = savedToken;
      }

      // Notify state on every relevant event.
      // MusicKit JS v3: playback properties live directly on the instance,
      // not on the removed music.player sub-object.
      function notifyState() {
        const m    = MusicKit.getInstance();
        const item = m.nowPlayingItem;
        const state = {
          isPlaying:     m.isPlaying,
          playbackState: m.playbackState,
          currentTime:   m.currentPlaybackTime,
          duration:      m.currentPlaybackDuration,
          volume:        m.volume,
          nowPlaying: item ? {
            id:         item.id,
            title:      item.attributes.name,
            artist:     item.attributes.artistName,
            album:      item.attributes.albumName,
            artworkURL: MusicKit.formatArtworkURL(item.attributes.artwork, 300, 300),
            durationMs: item.attributes.durationInMillis
          } : null
        };
        goPlayerStateChange(JSON.stringify(state)).catch(console.error);
      }

      music.addEventListener('playbackStateDidChange',  notifyState);
      music.addEventListener('nowPlayingItemDidChange', notifyState);
      music.addEventListener('playbackTimeDidChange',   notifyState);

      // Forward user token changes so Go can persist them.
      music.addEventListener('userTokenDidChange', function() {
        const tok = MusicKit.getInstance().musicUserToken || '';
        goUserTokenChanged(tok).catch(console.error);
      });

      // Playback controls — called via w.Eval() from Go.
      const _m = () => MusicKit.getInstance();
      const _err = async (prefix, e) => {
        const msg = (e instanceof Error) ? e.message : String(e ?? 'unknown');
        await goError(prefix + msg).catch(() => {});
      };
      window.vibezPlay   = async () => { try { await _m().play(); } catch(e) { await _err('play: ', e); } };
      window.vibezPause  = async () => { try { await _m().pause(); } catch(e) { await _err('pause: ', e); } };
      window.vibezToggle = async () => { try { _m().isPlaying ? await _m().pause() : await _m().play(); } catch(e) { await _err('toggle: ', e); } };
      window.vibezNext   = async () => { try { await _m().skipToNextItem(); } catch(e) { await _err('next: ', e); } };
      window.vibezPrev   = async () => { try { await _m().skipToPreviousItem(); } catch(e) { await _err('prev: ', e); } };
      window.vibezSeek   = (t) => _m().seekToTime(t);
      window.vibezSetVolume = (v) => { _m().volume = v; };

      // Queue a list of song IDs and start playback immediately.
      // Library IDs start with "i." — use the /v1/me/library/songs/ URL
      // descriptor so MusicKit plays the full owned track instead of the
      // 30-second catalog preview.
      // NOTE: do NOT call m.stop() before setQueue — it tears down the
      // GStreamer pipeline and races with the XWayland compositor, causing
      // a screen flash/crash. MusicKit handles the transition internally.
      window.vibezSetQueue = async function(idsJSON) {
        try {
          const ids = JSON.parse(idsJSON);
          if (!ids || ids.length === 0) {
            await goError('setQueue: empty id list').catch(() => {});
            return;
          }
          const m = MusicKit.getInstance();
          if (!m) {
            await goError('setQueue: MusicKit instance not available').catch(() => {});
            return;
          }

          // Determine queue descriptor.
          // Library IDs (i.XXXXX) → URL format → full owned-track playback.
          // Catalog IDs (numeric) → { song/songs } → catalog playback.
          let descriptor;
          const isLibrary = ids[0].startsWith('i.');
          if (isLibrary) {
            const path = ids.length === 1
              ? `/v1/me/library/songs/${ids[0]}`
              : `/v1/me/library/songs?ids=${ids.map(encodeURIComponent).join(',')}`;
            descriptor = { url: path };
          } else {
            descriptor = ids.length === 1 ? { song: ids[0] } : { songs: ids };
          }

          await m.setQueue(descriptor);
          await m.play();
        } catch (e) {
          const msg = (e instanceof Error) ? e.message
                    : (e != null ? String(e) : 'unknown error');
          await goError('setQueue failed: ' + msg).catch(() => {});
        }
      };

      // Authorize — signal Go to show the window if needed, then run the
      // MusicKit auth flow, then hide the window and unblock WaitReady.
      try {
        await goNeedsAuth('pending').catch(() => {});
        const token = await music.authorize();
        await goUserTokenChanged(token || '').catch(() => {});
        await goAuthComplete('done').catch(() => {});
      } catch (e) {
        await goError('auth failed: ' + (e.message || String(e))).catch(() => {});
        return;
      }

    } catch (e) {
      goError(e.message || String(e)).catch(console.error);
    }
  });
</script>
</body>
</html>
