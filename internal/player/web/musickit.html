<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>vibez</title>
  <!--
    Shared MusicKit JS page used by both the WebKit and Chrome (CDP) backends.

    MODE DETECTION at runtime:
      CHROME MODE  — goStreamURL is NOT bound; MusicKit plays natively through
                     Chrome + Widevine (full DRM tracks, direct audio output).
      GSTREAMER MODE — goStreamURL IS bound; MusicKit is auth+API only; preview
                     URLs are sent to Go's GStreamer pipeline for audio output.

    Go ↔ JS bridge:
      Go → JS : page.Evaluate for vibez*() commands
      JS → Go : goNeedsAuth, goAuthComplete, goPlayerStateChange,
                goUserTokenChanged, goStorefrontChanged, goStreamURL*, goError
                (* GStreamer mode only)

    IMPORTANT: the musickitloaded listener MUST be registered before the
    musickit.js <script> tag — MusicKit dispatches the event synchronously
    during its own script execution, before any <body> scripts run.
  -->
  <script>
  document.addEventListener('musickitloaded', async function() {
    try {
      const configOpts = {
        developerToken: '{{.DeveloperToken}}',
        app: { name: 'vibez', build: '{{.Version}}' },
      };
      // Do NOT pass storefrontId from config here. If the config still has the
      // default "us" value for a non-US account, forcing it overrides MusicKit's
      // auto-detection and causes CONTENT_EQUIVALENT for every non-US track.
      // MusicKit derives the correct storefront from the user token automatically.
      const music = await MusicKit.configure(configOpts);

      const savedToken = '{{.UserToken}}';
      if (savedToken !== '') {
        music.musicUserToken = savedToken;
      }

      // ── Runtime mode detection ───────────────────────────────────────────
      // goStreamURL is only bound in GStreamer (WebKit fallback) mode.
      // In Chrome mode it is absent and MusicKit plays natively.
      const GSTREAMER_MODE = typeof goStreamURL === 'function';

      // errName extracts a human-readable description from MusicKit errors.
      const errName = (e) => {
        if (!e) return '';
        const name = (typeof e.name === 'string' && e.name) ? e.name : '';
        const msg  = (typeof e.message === 'string' && e.message) ? e.message : '';
        if (name && msg && name !== 'Error') return name + ': ' + msg;
        return msg || name || String(e);
      };

      // ── State notification ───────────────────────────────────────────────
      function notifyStateFromItem(item, isPlaying) {
        if (!item) return;
        const artwork = item.attributes.artwork;
        const state = {
          isPlaying:     isPlaying,
          playbackState: isPlaying ? 3 : 2,
          currentTime:   0,
          duration:      (item.attributes.durationInMillis || 0) / 1000,
          volume:        1.0,
          nowPlaying: {
            id:         item.id,
            title:      item.attributes.name,
            artist:     item.attributes.artistName,
            album:      item.attributes.albumName,
            artworkURL: artwork ? MusicKit.formatArtworkURL(artwork, 300, 300) : '',
            durationMs: item.attributes.durationInMillis || 0,
          },
        };
        goPlayerStateChange(JSON.stringify(state)).catch(console.error);
      }

      // ── Token / storefront forwarding (both modes) ───────────────────────
      music.addEventListener('userTokenDidChange', function() {
        goUserTokenChanged(MusicKit.getInstance().musicUserToken || '').catch(console.error);
      });
      music.addEventListener('storefrontIdentifierDidChange', function() {
        goStorefrontChanged(MusicKit.getInstance().storefrontId || '').catch(console.error);
      });

      // ════════════════════════════════════════════════════════════════════
      // CHROME MODE — MusicKit plays natively; we just mirror state to Go.
      // ════════════════════════════════════════════════════════════════════
      if (!GSTREAMER_MODE) {
        const _m = () => MusicKit.getInstance();

        // Update the W3C MediaSession so OS notifications / MPRIS show the
        // current track under the "vibez" player identity.
        function updateMediaSession(item, isPlaying) {
          if (item) {
            const artwork = item.attributes.artwork;
            navigator.mediaSession.metadata = new MediaMetadata({
              title:  item.attributes.name,
              artist: item.attributes.artistName,
              album:  item.attributes.albumName,
              artwork: artwork
                ? [{ src: MusicKit.formatArtworkURL(artwork, 512, 512), sizes: '512x512', type: 'image/jpeg' }]
                : [],
            });
          } else {
            navigator.mediaSession.metadata = null;
          }
          navigator.mediaSession.playbackState = isPlaying ? 'playing' : 'paused';
        }

        function notifyState() {
          const m = _m();
          const item = m.nowPlayingItem;
          updateMediaSession(item, m.isPlaying);
          const state = {
            isPlaying:     m.isPlaying,
            playbackState: m.playbackState,
            currentTime:   m.currentPlaybackTime,
            duration:      m.currentPlaybackDuration,
            volume:        m.volume,
            repeatMode:    m.repeatMode  || 0,
            shuffleMode:   m.shuffleMode || 0,
            nowPlaying: item ? {
              id:         item.id,
              title:      item.attributes.name,
              artist:     item.attributes.artistName,
              album:      item.attributes.albumName,
              artworkURL: item.attributes.artwork
                ? MusicKit.formatArtworkURL(item.attributes.artwork, 300, 300) : '',
              durationMs: item.attributes.durationInMillis,
            } : null,
          };
          goPlayerStateChange(JSON.stringify(state)).catch(console.error);
        }

        music.addEventListener('playbackStateDidChange',  notifyState);
        music.addEventListener('nowPlayingItemDidChange', notifyState);

        // Poll position every second so the TUI timer advances while playing.
        setInterval(function() { if (_m().isPlaying) notifyState(); }, 1000);

        // Shorthand: send a debug-only log entry (never shown in status bar).
        const _stateN = ['none','loading','playing','paused','stopped','ended','seekFwd','seekBwd','waiting','completed'];
        const _log = (msg) => goLog(msg).catch(() => {});

        // ─── Chrome-mode queue tracker ───────────────────────────────────────
        // _q[]  = source of truth for all queued songs
        // _qi   = index of the currently playing item in _q
        //
        // MusicKit's native queue is built ONCE (on first play / explicit rebuild)
        // with ALL songs via setQueue({songs:[...]}).  Navigation uses
        // skipToNextItem / skipToPreviousItem exclusively — no setQueue re-calls.
        // New songs appended while playing go through m.queue.append().
        //
        // Why: setQueue() mid-session is silently ignored by MusicKit (it returns
        // CONTENT_EQUIVALENT) and leaves the native queue unchanged, creating a
        // hard desync between _q and what MusicKit is actually playing.

        let _q       = [];    // resolved items from the Apple Music API
        let _qi      = -1;    // index of the currently playing item (-1 = nothing)
        let _busy    = false; // guard: only one _buildAndPlay running at a time
        let _wantIdx = -1;    // pending explicit-jump target; -1 = none
        let _libMap  = {};    // catalog ID → library song ID, for CONTENT_UNAVAILABLE fallback

        // Resolve a mixed array of catalog + library IDs → MediaItem objects.
        // Catalog songs are fetched with include=library so we can cache the
        // user's library copy ID for each matched song — used as a fallback when
        // a catalog track is region-locked (CONTENT_UNAVAILABLE).
        async function _resolveItems(allIds) {
          const catalogIds = allIds.filter(id => !id.startsWith('i.'));
          const libraryIds = allIds.filter(id =>  id.startsWith('i.'));
          const sf = _m().storefrontId || 'us';
          let items = [];
          if (catalogIds.length > 0) {
            try {
              const r = await _m().api.music(`/v1/catalog/${sf}/songs`, { ids: catalogIds, include: 'library' });
              const songs = r?.data?.data ?? [];
              for (const song of songs) {
                // Cache the user's library ID for this catalog song if present.
                const libId = song.relationships?.library?.data?.[0]?.id;
                if (libId) _libMap[song.id] = libId;
              }
              // Pre-filter: drop songs without playParams — they cannot be streamed
              // regardless of account or storefront (e.g. radio-only tracks).
              const playable = songs.filter(s => !!s.attributes?.playParams);
              const dropped  = songs.length - playable.length;
              if (dropped > 0) _log(`[js:resolve] dropped ${dropped} non-playable song(s)`);
              items = items.concat(playable);
            } catch(e) { goError('[resolve] catalog: '+errName(e)).catch(()=>{}); }
          }
          if (libraryIds.length > 0) {
            try {
              const r = await _m().api.music('/v1/me/library/songs', { ids: libraryIds });
              items = items.concat(r && r.data && r.data.data ? r.data.data : []);
            } catch(e) { goError('[resolve] library: '+errName(e)).catch(()=>{}); }
          }
          return items;
        }

        // Stop playback and wait (event-driven) for MusicKit to fully settle in
        // stopped(4) or none(0) state before returning.  m.stop() resolves its
        // Promise as soon as the command is sent, but MusicKit still goes through
        // intermediate states (paused→seekFwd→paused→stopped).  Calling setQueue
        // during that transition triggers CONTENT_EQUIVALENT even for unrelated
        // songs.  500 ms cap prevents hanging if the event never fires.
        function _stopAndWait(m) {
          const stable = [0, 4]; // none, stopped
          if (stable.includes(m.playbackState)) return Promise.resolve();
          return new Promise(resolve => {
            const handler = () => {
              if (stable.includes(m.playbackState)) {
                m.removeEventListener('playbackStateDidChange', handler);
                clearTimeout(t);
                resolve();
              }
            };
            const t = setTimeout(() => {
              m.removeEventListener('playbackStateDidChange', handler);
              resolve();
            }, 500);
            m.addEventListener('playbackStateDidChange', handler);
            m.stop().catch(() => {});
          });
        }

        // Try the user's library copy of _q[idx] as a fallback when a catalog
        // track is unavailable (CONTENT_UNAVAILABLE), region-locked
        // (CONTENT_EQUIVALENT), or restricted (CONTENT_RESTRICTED).
        // Library items bypass storefront and account restrictions.
        // On success: swap _q[idx] and schedule a retry.
        // On failure: skip silently to the next track.
        async function _libraryFallback(idx, item) {
          if (item.id.startsWith('i.')) {
            // Already using a library item and still failing — nothing left to try.
            _log(`[js:doPlay] library item still failing → skip #${idx+1}`);
            if (idx + 1 < _q.length) _wantIdx = idx + 1;
            return;
          }
          const libId = _libMap[item.id];
          _log(`[js:doPlay] fallback libId=${libId||'none'}`);
          if (libId) {
            try {
              const r = await _m().api.music('/v1/me/library/songs', { ids: [libId] });
              const lib = r?.data?.data ?? [];
              if (lib.length > 0) {
                _log(`[js:doPlay] library swap OK → retry #${idx}`);
                _q[idx]  = lib[0];
                _wantIdx = idx; // retry via finally
                return;
              }
            } catch(_) {}
          }
          _log(`[js:doPlay] no library copy → skip #${idx+1}`);
          if (idx + 1 < _q.length) _wantIdx = idx + 1;
        }

        // Play the item at idx in _q.
        // Waits for MusicKit to fully settle in stopped state before setQueue so
        // mid-transition states (seekFwd etc.) don't trigger spurious CE errors.
        // CONTENT_EQUIVALENT / CONTENT_UNAVAILABLE → library fallback then skip.
        // _busy + _wantIdx ensure only one call runs at a time; latest index wins.
        async function _doPlayAt(idx) {
          _busy    = true;
          _wantIdx = -1;
          _qi      = idx;

          const m    = _m();
          const item = _q[idx];
          const name = item?.attributes?.name ?? item?.id ?? '?';
          const descriptor = item.id.startsWith('i.')
            ? { items: [item] }
            : { songs: [item.id] };

          _log(`[js:doPlay] → #${idx} "${name}" (${item?.id})`);

          try {
            // Wait for MusicKit to fully reach stopped/none before setQueue.
            // Calling setQueue mid-transition (e.g. during seekFwd) causes CE.
            await _stopAndWait(m);
            _log(`[js:doPlay] state=${_stateN[m.playbackState]||m.playbackState} — setQueue`);

            try {
              await m.setQueue(descriptor);
            } catch(e) {
              if (e?.name === 'CONTENT_EQUIVALENT' || e?.name === 'CONTENT_UNAVAILABLE' || e?.name === 'CONTENT_RESTRICTED') {
                _log(`[js:doPlay] setQueue ${e.name} — trying library`);
                await _libraryFallback(idx, item);
                return;
              }
              throw e;
            }

            try {
              await m.play();
              _log(`[js:doPlay] playing ✓ #${idx}`);
            } catch(e) {
              if (e?.name === 'CONTENT_EQUIVALENT' || e?.name === 'CONTENT_UNAVAILABLE' || e?.name === 'CONTENT_RESTRICTED') {
                _log(`[js:doPlay] play ${e.name} — trying library`);
                await _libraryFallback(idx, item);
                return;
              }
              throw e;
            }
          } catch(e) {
            _log(`[js:doPlay] error: ${errName(e)}`);
            goError('play: '+errName(e)).catch(() => {});
            if (idx + 1 < _q.length) _wantIdx = idx + 1;
          } finally {
            _log(`[js:doPlay] done #${idx}, wantIdx=${_wantIdx}`);
            _busy = false;
            if (_wantIdx >= 0 && _wantIdx < _q.length) {
              const next = _wantIdx;
              _wantIdx   = -1;
              _doPlayAt(next);
            }
          }
        }

        function _playAt(idx) {
          if (idx < 0 || idx >= _q.length) {
            _log(`[js:playAt] #${idx} out of range (len=${_q.length})`);
            return;
          }
          if (_busy) { _log(`[js:playAt] busy → queue #${idx}`); _wantIdx = idx; return; }
          _doPlayAt(idx);
        }

        // Auto-advance when a track ends naturally.
        // Uses playbackStateDidChange(completed=9) instead of nowPlayingItemDidChange:
        //   stop() → state=stopped(4)  — NOT caught here → no spurious advance
        //   track ends naturally → state=ended(5) → state=completed(9) — caught here
        // _busy covers any edge-case fires during our own transitions.
        music.addEventListener('playbackStateDidChange', () => {
          const m = _m();
          _log(`[js:state] ${_stateN[m.playbackState]||m.playbackState}`);
          if (m.playbackState !== 9 /* completed */) return;
          _log(`[js:auto] completed _qi=${_qi} next=${_qi+1} len=${_q.length} busy=${_busy}`);
          if (_busy || _qi < 0 || _q.length === 0) return;
          if (m.repeatMode === 1 /* repeat-one */) { _playAt(_qi); return; }
          const next = _qi + 1;
          if (next < _q.length)                    { _playAt(next); return; }
          if (m.repeatMode === 2 /* repeat-all */)  { _playAt(0); }
          // else: end of queue — stay stopped cleanly
        });

        window.vibezPlay = async () => {
          const m = _m();
          _log(`[js:play] state=${_stateN[m.playbackState]||m.playbackState} item=${m.nowPlayingItem?.id||'null'} _qi=${_qi}`);
          // Restart from _qi if nothing is loaded (queue ended or fresh start).
          if (!m.nowPlayingItem && _qi >= 0 && _q.length > 0) { _log('[js:play] restart _qi'); _playAt(_qi); return; }
          try { await m.play(); _log('[js:play] resumed ✓'); }
          catch(e) {
            if (e?.name === 'CONTENT_EQUIVALENT') {
              // CE on resume: force stop → play to break out of the stuck state.
              // Do NOT call _playAt here — that would re-run setQueue on the
              // same item and trigger another CE chain.
              _log('[js:play] CE → stop+play to recover');
              await m.stop().catch(() => {});
              try { await m.play(); _log('[js:play] recovered ✓'); }
              catch(e2) { _log(`[js:play] recovery failed: ${errName(e2)}`); goError('play: '+errName(e2)).catch(()=>{}); }
            } else {
              _log(`[js:play] error: ${errName(e)}`);
              goError('play: '+errName(e)).catch(()=>{});
            }
          }
        };
        window.vibezPause = async () => {
          _log(`[js:pause] state=${_stateN[_m().playbackState]||_m().playbackState}`);
          try { await _m().pause(); _log('[js:pause] paused ✓'); }
          catch(e) { _log(`[js:pause] error: ${errName(e)}`); goError('pause: '+errName(e)).catch(()=>{}); }
        };
        window.vibezNext  = () => {
          _log(`[js:next] _qi=${_qi} len=${_q.length} busy=${_busy}`);
          if (_qi < _q.length - 1) _playAt(_qi + 1);
          else _log(`[js:next] already at end of queue`);
        };
        window.vibezPrev  = () => { _log(`[js:prev] _qi=${_qi}`); _playAt(_qi > 0 ? _qi - 1 : 0); };
        window.vibezSeek      = (t) => _m().seekToTime(t);
        window.vibezSetVolume = (v) => { _m().volume = v; };
        window.vibezSetRepeat  = (mode) => { _m().repeatMode  = mode; };
        window.vibezSetShuffle = (on)   => { _m().shuffleMode = on ? 1 : 0; };

        // Wire OS media keys / MPRIS back to our own functions.
        navigator.mediaSession.setActionHandler('play',          () => window.vibezPlay());
        navigator.mediaSession.setActionHandler('pause',         () => window.vibezPause());
        navigator.mediaSession.setActionHandler('nexttrack',     () => window.vibezNext());
        navigator.mediaSession.setActionHandler('previoustrack', () => window.vibezPrev());
        navigator.mediaSession.setActionHandler('seekto', (d) => _m().seekToTime(d.seekTime));

        window.vibezSetQueue = async function(idsJSON) {
          try {
            const ids = (JSON.parse(idsJSON) || []).filter(Boolean);
            const items = await _resolveItems(ids);
            if (items.length === 0) { goError('setQueue: no items resolved').catch(()=>{}); return; }
            _q  = items;
            _qi = -1;
            _playAt(0);
          } catch(e) { goError('setQueue failed: '+errName(e)).catch(()=>{}); }
        };

        window.vibezSetPlaylist = async function(playlistID, startIdx) {
          try {
            const m   = _m();
            const sf  = m.storefrontId || 'us';
            const url = playlistID.startsWith('p.')
              ? `/v1/me/library/playlists/${playlistID}/tracks`
              : `/v1/catalog/${sf}/playlists/${playlistID}/tracks`;
            let items = [];
            try {
              const resp = await m.api.music(url);
              items = resp && resp.data && resp.data.data ? resp.data.data : [];
            } catch(e) { goError('[playlist] API failed: '+errName(e)).catch(()=>{}); return; }
            if (items.length === 0) { goError('setPlaylist: no items').catch(()=>{}); return; }
            _q  = items;
            _qi = -1;
            _playAt(startIdx || 0);
          } catch(e) { goError('setPlaylist failed: '+errName(e)).catch(()=>{}); }
        };

        window.vibezAppendQueue = async function(idsJSON) {
          try {
            const ids   = (JSON.parse(idsJSON) || []).filter(Boolean);
            _log(`[js:append] resolving id=${ids[0]}`);
            const items = await _resolveItems(ids);
            if (items.length === 0) { _log('[js:append] no items resolved — skip'); return; }
            _q = _q.concat(items);
            _log(`[js:append] +${items.length} → _q.length=${_q.length} _qi=${_qi}`);
            if (_qi < 0) _playAt(0); // nothing was playing — start now
            // else: items enqueued; auto-advance (or next/prev) will pick them up
          } catch(e) { goError('appendQueue failed: '+errName(e)).catch(()=>{}); }
        };

        window.vibezQueueRemove = function(idxStr) {
          const idx = parseInt(idxStr);
          if (idx < 0 || idx >= _q.length) return;
          if (idx === _qi) {
            _q.splice(idx, 1);
            if (_q.length === 0) { _qi = -1; _m().stop().catch(()=>{}); return; }
            if (_qi >= _q.length) _qi = _q.length - 1;
            _playAt(_qi);
          } else {
            _q.splice(idx, 1);
            if (idx < _qi) _qi--;
          }
        };

        window.vibezQueueMove = function(fromStr, toStr) {
          const from = parseInt(fromStr);
          const to   = parseInt(toStr);
          if (from < 0 || from >= _q.length || to < 0 || to >= _q.length || from === to) return;
          const item = _q.splice(from, 1)[0];
          _q.splice(to, 0, item);
          if (_qi === from)                 _qi = to;
          else if (from < _qi && to >= _qi) _qi--;
          else if (from > _qi && to <= _qi) _qi++;
        };

        window.vibezQueueClear = function() {
          _q  = [];
          _qi = -1;
          _m().stop().catch(()=>{});
        };

      // ════════════════════════════════════════════════════════════════════
      // GSTREAMER MODE — preview URLs sent to Go; MusicKit is auth+API only.
      // ════════════════════════════════════════════════════════════════════
      } else {
        let _queue = [];
        let _idx   = 0;

        function playIdx(idx) {
          if (idx < 0 || idx >= _queue.length) return;
          _idx = idx;
          const item     = _queue[idx];
          const previews = item.attributes && item.attributes.previews;
          if (previews && previews.length > 0) {
            goStreamURL(previews[0].url).catch(() => {});
          } else {
            goError('no preview URL for: ' + item.attributes.name).catch(() => {});
          }
          notifyStateFromItem(item, true);
        }

        window.vibezPlay  = () => { notifyStateFromItem(_queue[_idx], true);  };
        window.vibezPause = () => { notifyStateFromItem(_queue[_idx], false); };
        window.vibezNext  = () => { if (_idx < _queue.length - 1) playIdx(_idx + 1); };
        window.vibezPrev  = () => { if (_idx > 0) playIdx(_idx - 1); };
        window.vibezSeek      = () => {};
        window.vibezSetVolume = () => {};

        window.vibezSetQueue = async function(idsJSON) {
          try {
            const ids = JSON.parse(idsJSON);
            const m = MusicKit.getInstance();
            const allIds     = (ids || []).filter(Boolean);
            const catalogIds = allIds.filter(id => !id.startsWith('i.'));
            const libraryIds = allIds.filter(id =>  id.startsWith('i.'));
            const sf = m.storefrontId || 'us';

            if (allIds.length === 0) { goError('setQueue: empty id list').catch(() => {}); return; }

            let items = [];
            if (catalogIds.length > 0) {
              try {
                const resp = await m.api.music(`/v1/catalog/${sf}/songs`, { ids: catalogIds });
                items = resp && resp.data && resp.data.data ? resp.data.data : [];
              } catch(e) { goError(`[queue] catalog API failed: ${errName(e)}`).catch(() => {}); }
            }
            if (items.length === 0 && libraryIds.length > 0) {
              try {
                const resp = await m.api.music('/v1/me/library/songs', { ids: libraryIds });
                items = resp && resp.data && resp.data.data ? resp.data.data : [];
              } catch(e) { goError(`[queue] library API failed: ${errName(e)}`).catch(() => {}); }
            }
            if (items.length === 0) { goError('setQueue: no items resolved').catch(() => {}); return; }

            _queue = items;
            playIdx(0);
          } catch(e) { goError('setQueue failed: ' + errName(e)).catch(() => {}); }
        };

        window.vibezSetPlaylist = async function(playlistID, startIdx) {
          try {
            const m = MusicKit.getInstance();
            const sf = m.storefrontId || 'us';
            let items = [];
            try {
              const resp = await m.api.music(`/v1/catalog/${sf}/playlists/${playlistID}/tracks`);
              items = resp && resp.data && resp.data.data ? resp.data.data : [];
            } catch(e) { goError('[playlist] API failed: '+errName(e)).catch(()=>{}); return; }
            if (items.length === 0) { goError('setPlaylist: no items').catch(()=>{}); return; }
            _queue = items;
            playIdx(startIdx || 0);
          } catch(e) { goError('setPlaylist failed: ' + errName(e)).catch(() => {}); }
        };

        window.vibezAppendQueue = async function(idsJSON) {
          try {
            const ids = JSON.parse(idsJSON);
            const m = MusicKit.getInstance();
            const allIds     = (ids || []).filter(Boolean);
            const catalogIds = allIds.filter(id => !id.startsWith('i.'));
            const libraryIds = allIds.filter(id =>  id.startsWith('i.'));
            const sf = m.storefrontId || 'us';

            if (allIds.length === 0) { goError('appendQueue: empty id list').catch(() => {}); return; }

            let items = [];
            if (catalogIds.length > 0) {
              try {
                const resp = await m.api.music(`/v1/catalog/${sf}/songs`, { ids: catalogIds });
                items = resp && resp.data && resp.data.data ? resp.data.data : [];
              } catch(e) { goError(`[queue] catalog API failed: ${errName(e)}`).catch(() => {}); }
            }
            if (items.length === 0 && libraryIds.length > 0) {
              try {
                const resp = await m.api.music('/v1/me/library/songs', { ids: libraryIds });
                items = resp && resp.data && resp.data.data ? resp.data.data : [];
              } catch(e) { goError(`[queue] library API failed: ${errName(e)}`).catch(() => {}); }
            }
            if (items.length === 0) { _log('[js:append] no items resolved — skip'); return; }

            const wasEmpty = _queue.length === 0;
            _queue = _queue.concat(items);
            if (wasEmpty) playIdx(0);
          } catch(e) { goError('appendQueue failed: ' + errName(e)).catch(() => {}); }
        };

        window.vibezQueueRemove = function(idxStr) {
          const idx = parseInt(idxStr);
          if (idx < 0 || idx >= _queue.length) return;
          _queue.splice(idx, 1);
          if (idx < _idx)       _idx--;
          else if (idx === _idx) {
            if (_queue.length === 0) { _idx = -1; return; }
            if (_idx >= _queue.length) _idx = _queue.length - 1;
            playIdx(_idx);
          }
        };

        window.vibezQueueMove = function(fromStr, toStr) {
          const from = parseInt(fromStr);
          const to   = parseInt(toStr);
          if (from < 0 || from >= _queue.length || to < 0 || to >= _queue.length || from === to) return;
          const item = _queue.splice(from, 1)[0];
          _queue.splice(to, 0, item);
          if (_idx === from)                  _idx = to;
          else if (from < _idx && to >= _idx) _idx--;
          else if (from > _idx && to <= _idx) _idx++;
        };

        window.vibezQueueClear = function() {
          _queue = [];
          _idx   = -1;
        };
      }

      // ── Auth (both modes) ────────────────────────────────────────────────
      // savedToken is already declared above and musicUserToken pre-set.
      // If a token exists, skip music.authorize() — in headless Chrome it
      // opens an invisible OAuth popup that hangs forever. Use the token
      // directly; if it's expired, API calls will fail and we handle it then.
      if (savedToken !== '') {
        const sf = music.storefrontId || '(unknown)';
        await goStorefrontChanged(sf).catch(() => {});
        await goLog(`[init] storefront=${sf} configured={{.Storefront}} musickit=${MusicKit.version||'?'} token=saved`).catch(() => {});
        await goAuthComplete('done').catch(() => {});
      } else {
        // No saved token: need interactive auth (Chrome window is visible).
        try {
          await goNeedsAuth('pending').catch(() => {});
          const token = await music.authorize();
          await goUserTokenChanged(token || '').catch(() => {});
          const sf = music.storefrontId || '(unknown)';
          await goStorefrontChanged(sf).catch(() => {});
          await goLog(`[init] storefront=${sf} configured={{.Storefront}} musickit=${MusicKit.version||'?'} token=new`).catch(() => {});
          await goAuthComplete('done').catch(() => {});
        } catch(e) {
          goError('auth failed: ' + (e.message || String(e))).catch(() => {});
          return;
        }
      }

    } catch(e) {
      goError(e.message || String(e)).catch(console.error);
    }
  });
  </script>
  <script src="https://js-cdn.music.apple.com/musickit/v3/musickit.js"
          onerror="if(typeof goError==='function'){goError('MusicKit.js failed to load from CDN').catch(function(){});}"></script>
