version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gosec
    - govet
    - ineffassign
    - modernize
    - revive
    - staticcheck
    - testifylint
    - unused
  settings:
    revive:
      rules:
        - name: exported
          disabled: true

formatters:
  enable:
    - gofmt
    - goimports
